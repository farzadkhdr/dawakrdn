<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی ناردنی داواکاری</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #166088;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #17a2b8;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #166088;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #17a2b8;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #17a2b8;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background: #138496;
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 15px;
            margin: 20px 0;
            border-radius: 6px;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .api-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online {
            background: #d4edda;
            color: #155724;
        }

        .offline {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>فرۆشتنی خانوو</h1>
        
        <form id="houseSaleForm">
            <div class="form-group">
                <label for="mobile">ژمارەی موبایل:</label>
                <input type="tel" id="mobile" placeholder="٠٧٧٠ ١٢٣ ٤٥٦٧" required>
            </div>
            
            <div class="form-group">
                <label for="name">ناو:</label>
                <input type="text" id="name" placeholder="ناوی تۆمار بکە" required>
            </div>
            
            <div class="form-group">
                <label for="location">شوێن:</label>
                <input type="text" id="location" placeholder="شوێنەکەت بنووسە" required>
            </div>
            
            <div class="form-group">
                <label for="saleType">جۆری فرۆشتنی خانوو:</label>
                <select id="saleType" required>
                    <option value="">هەڵبژێرە</option>
                    <option value="تاپۆ">تاپۆ</option>
                    <option value="کارت">کارت</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="size">قەبارە (مەتر):</label>
                <select id="size" required>
                    <option value="">هەڵبژێرە</option>
                    <option value="100">100 م²</option>
                    <option value="150">150 م²</option>
                    <option value="200">200 م²</option>
                    <option value="250">250 م²</option>
                    <option value="300">300 م²</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="price">نرخی خانووەکە (دینار):</label>
                <input type="number" id="price" placeholder="50000000" required>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn">
                ناردنی داواکاری
            </button>
        </form>
        
        <div id="message" class="message" style="display: none;"></div>
    </div>
    
    <div id="apiStatus" class="api-status" style="display: none;"></div>

    <script>
        const API_BASE_URL = 'https://systamwargrtn.vercel.app';
        const form = document.getElementById('houseSaleForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const apiStatus = document.getElementById('apiStatus');

        // تاقیکردنەوەی API
        async function testAPI() {
            try {
                console.log('🔍 تاقیکردنەوەی پەیوەندی بە API...');
                
                // تاقیکردنەوەی سادە
                const testData = {
                    name: "تەست",
                    mobile: "07701234567",
                    location: "شۆرش",
                    type: "فرۆشتنی خانوو",
                    size: "150",
                    price: "50000000",
                    saleType: "تاپۆ"
                };
                
                console.log('📤 ناردنی داتا:', testData);
                
                // ٣ ڕێگەی جیاواز تاقی دەکەین
                console.log('🔄 تاقیکردنەوەی ڕێگەی ١: JSON POST');
                try {
                    const response1 = await fetch(`${API_BASE_URL}/api/requests`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(testData)
                    });
                    console.log('✅ ڕێگەی ١: وەڵام=', response1.status);
                    if (response1.ok) {
                        const result = await response1.json();
                        console.log('✅ سەرکەوتوو:', result);
                        return true;
                    }
                } catch (e1) {
                    console.log('❌ ڕێگەی ١ شکستی هێنا:', e1.message);
                }
                
                console.log('🔄 تاقیکردنەوەی ڕێگەی ٢: FormData');
                try {
                    const formData = new FormData();
                    Object.keys(testData).forEach(key => {
                        formData.append(key, testData[key]);
                    });
                    
                    const response2 = await fetch(`${API_BASE_URL}/api/requests`, {
                        method: 'POST',
                        body: formData
                    });
                    console.log('✅ ڕێگەی ٢: وەڵام=', response2.status);
                    if (response2.ok) return true;
                } catch (e2) {
                    console.log('❌ ڕێگەی ٢ شکستی هێنا:', e2.message);
                }
                
                console.log('🔄 تاقیکردنەوەی ڕێگەی ٣: GET پەیوەندی');
                try {
                    const params = new URLSearchParams(testData).toString();
                    const response3 = await fetch(`${API_BASE_URL}/api/requests?${params}`, {
                        method: 'GET'
                    });
                    console.log('✅ ڕێگەی ٣: وەڵام=', response3.status);
                    if (response3.ok) return true;
                } catch (e3) {
                    console.log('❌ ڕێگەی ٣ شکستی هێنا:', e3.message);
                }
                
                return false;
                
            } catch (error) {
                console.error('💥 تاقیکردنەوەی API شکستی هێنا:', error);
                return false;
            }
        }

        // ناردنی فۆرم
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // وەرگرتنی داتا
            const formData = {
                name: document.getElementById('name').value,
                mobile: document.getElementById('mobile').value.replace(/[^0-9]/g, ''),
                location: document.getElementById('location').value,
                type: "فرۆشتنی خانوو",
                size: document.getElementById('size').value,
                price: document.getElementById('price').value,
                saleType: document.getElementById('saleType').value
            };
            
            // پشکنینی داتا
            if (!formData.name || !formData.mobile || !formData.location || 
                !formData.saleType || !formData.size || !formData.price) {
                showMessage('تکایە هەموو خانەکان پڕ بکەرەوە', 'error');
                return;
            }
            
            // دەستکاریکردنی بەرگە
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> لە ناردنە...';
            
            // ناردن بە ڕێگەی جیاواز
            let success = false;
            let errorMessage = '';
            
            try {
                console.log('🚀 دەستپێکردنی ناردن...');
                
                // ڕێگەی ١: JSON (ئاسایی)
                try {
                    console.log('🔵 تاقیکردنەوەی ڕێگەی JSON...');
                    const response = await fetch(`${API_BASE_URL}/api/requests`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });
                    
                    console.log('📥 وەڵام وەرگیرا:', response.status);
                    
                    if (response.ok) {
                        const result = await response.json();
                        console.log('✅ سەرکەوتوو:', result);
                        success = true;
                    } else {
                        const errorText = await response.text();
                        console.error('❌ هەڵە:', errorText);
                        errorMessage = `سێرڤەر وەڵامی ${response.status} داوە`;
                    }
                } catch (jsonError) {
                    console.error('❌ JSON هەڵە:', jsonError.message);
                    errorMessage = jsonError.message;
                }
                
                // ئەگەر JSON شکستی هێنا، FormData تاقی بکە
                if (!success) {
                    console.log('🟡 تاقیکردنەوەی ڕێگەی FormData...');
                    try {
                        const fd = new FormData();
                        Object.keys(formData).forEach(key => {
                            fd.append(key, formData[key]);
                        });
                        
                        const fdResponse = await fetch(`${API_BASE_URL}/api/requests`, {
                            method: 'POST',
                            body: fd
                        });
                        
                        console.log('📥 FormData وەڵام:', fdResponse.status);
                        
                        if (fdResponse.ok) {
                            success = true;
                        } else {
                            const fdError = await fdResponse.text();
                            errorMessage = `FormData: ${fdResponse.status} - ${fdError}`;
                        }
                    } catch (fdError) {
                        console.error('❌ FormData هەڵە:', fdError);
                    }
                }
                
            } catch (error) {
                console.error('💥 هەڵەی گشتی:', error);
                errorMessage = error.message;
            }
            
            // پاشکەوتی دەرئەنجام
            if (success) {
                showMessage('✅ داواکاریەکەت بە سەرکەوتویی نێردرا!', 'success');
                form.reset();
            } else {
                showMessage(`❌ هەڵە: ${errorMessage || 'پەیوەندی بە سێرڤەرەوە شکستی هێنا'}`, 'error');
            }
            
            // گەڕاندنەوەی بەرگە
            submitBtn.disabled = false;
            submitBtn.textContent = 'ناردنی داواکاری';
        });

        // نیشاندانی پەیام
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            }
        }

        // پشکنینی ئەنجامی API
        async function checkAPI() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/health`);
                if (response.ok) {
                    apiStatus.textContent = 'API چالاکە';
                    apiStatus.className = 'api-status online';
                } else {
                    apiStatus.textContent = 'API ناچالاکە';
                    apiStatus.className = 'api-status offline';
                }
                apiStatus.style.display = 'flex';
            } catch (error) {
                apiStatus.textContent = 'API ناچالاکە';
                apiStatus.className = 'api-status offline';
                apiStatus.style.display = 'flex';
            }
        }

        // دەستپێکردن
        document.addEventListener('DOMContentLoaded', () => {
            checkAPI();
            
            // تاقیکردنەوەی API لەسەر بارکردن
            setTimeout(() => {
                testAPI().then(result => {
                    if (result) {
                        console.log('🎉 تاقیکردنەوەی API سەرکەوتوو بوو!');
                    } else {
                        console.log('⚠️ تاقیکردنەوەی API شکستی هێنا!');
                        showMessage('⚠️ تاقیکردنەوەی API شکستی هێنا. لەوانەیە کێشەی CORS هەبێت.', 'error');
                    }
                });
            }, 1000);
        });
    </script>
</body>
</html>
